version: 0.0
os: linux

files:
  - source: /
    destination: /opt/eatpulse
    overwrite: true

file_exists_behavior: OVERWRITE

hooks:
  BeforeInstall:
    - location: infra/scripts/stop_application.sh
      timeout: 30
      runas: root

  AfterInstall:
    - location: infra/scripts/install_dependencies.sh
      timeout: 180
      runas: root

  ApplicationStart:
    - location: infra/scripts/start_application.sh
      timeout: 30
      runas: root

  ValidateService:
    - location: infra/scripts/validate_service.sh
      timeout: 60
      runas: root
