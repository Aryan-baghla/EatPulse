[databases]
; Aurora endpoint is injected by install_dependencies.sh at deploy time
eatpulse = host=AURORA_ENDPOINT port=5432 dbname=eatpulse

[pgbouncer]
logfile         = /var/log/pgbouncer/pgbouncer.log
pidfile         = /var/run/pgbouncer/pgbouncer.pid

listen_addr     = 127.0.0.1
listen_port     = 5432

auth_type       = scram-sha-256
auth_file       = /etc/pgbouncer/userlist.txt

; Transaction pooling — compatible with asyncpg (which uses statement_cache_size=0)
pool_mode       = transaction

max_client_conn = 100
default_pool_size = 10
min_pool_size   = 2
reserve_pool_size = 2

server_idle_timeout     = 300
client_idle_timeout     = 300
server_connect_timeout  = 15

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Stats
stats_period = 60
