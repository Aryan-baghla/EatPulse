AWSTemplateFormatVersion: "2010-09-09"
Description: ALB for EatPulse dashboard.eatpulse.in (default VPC)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Default VPC ID
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 public subnets in default VPC
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for dashboard.eatpulse.in

Resources:
  # ── ALB Security Group ──────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EatPulse ALB - public HTTPS/HTTP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIpv6: "::/0"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: "::/0"
      Tags:
        - Key: Name
          Value: eatpulse-alb-sg

  # ── Application Load Balancer ───────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: eatpulse-alb
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !GetAtt ALBSecurityGroup.GroupId
      Tags:
        - Key: Project
          Value: EatPulse

  # ── Target Group ────────────────────────────────────────────────────────────
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: eatpulse-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Project
          Value: EatPulse

  # ── HTTP Listener (redirect to HTTPS) ──────────────────────────────────────
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # ── HTTPS Listener ──────────────────────────────────────────────────────────
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ALBArn:
    Value: !Ref ALB
    Export:
      Name: EatPulse-ALBArn
  ALBDNSName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: EatPulse-ALBDNSName
  ALBHostedZoneId:
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: EatPulse-ALBHostedZoneId
  TargetGroupArn:
    Value: !Ref TargetGroup
    Export:
      Name: EatPulse-TargetGroupArn
  ALBSecurityGroupId:
    Value: !GetAtt ALBSecurityGroup.GroupId
    Export:
      Name: EatPulse-ALBSecurityGroupId
