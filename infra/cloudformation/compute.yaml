AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 Spot t3.small + ASG for EatPulse (default VPC, SSM access only)

Parameters:
  Environment:
    Type: String
    Default: prod
  InstanceType:
    Type: String
    Default: t3.small
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  TargetGroupArn:
    Type: String
  ALBSecurityGroupId:
    Type: String
  SecretsManagerSecretId:
    Type: String
    Description: Secrets Manager secret ID containing all app secrets
  ArtifactsBucketName:
    Type: String
    Description: S3 bucket for CodeDeploy deployment artifacts

Resources:
  # ── EC2 Security Group ──────────────────────────────────────────────────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EatPulse EC2 - allow from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroupId
      Tags:
        - Key: Name
          Value: eatpulse-ec2-sg
        - Key: Project
          Value: EatPulse

  # ── IAM Role for EC2 ────────────────────────────────────────────────────────
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "eatpulse-ec2-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EatPulseEC2Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:eatpulse/*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactsBucketName}"
                  - !Sub "arn:aws:s3:::${ArtifactsBucketName}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: "*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ── Launch Template ─────────────────────────────────────────────────────────
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "eatpulse-lt-${Environment}"
      LaunchTemplateData:
        ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt EC2SecurityGroup.GroupId
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            MaxPrice: "0.0208"
            SpotInstanceType: one-time
        UserData:
          Fn::Base64:
            !Sub |
              #!/bin/bash
              set -euo pipefail
              exec > >(tee /var/log/eatpulse-init.log) 2>&1
              echo "=== EatPulse bootstrap $(date -u) ==="

              SECRET_ID="${SecretsManagerSecretId}"
              REGION="${AWS::Region}"
              APP_DIR="/opt/eatpulse"
              APP_USER="eatpulse"

              # ── Packages ───────────────────────────────────────────────────
              dnf update -y -q
              dnf install -y -q python3.11 python3.11-pip python3.11-devel \
                  nginx pgbouncer postgresql15 git jq ruby wget gcc gcc-c++

              # ── CodeDeploy agent ───────────────────────────────────────────
              wget -q "https://aws-codedeploy-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/install" \
                  -O /tmp/cd-install
              chmod +x /tmp/cd-install
              /tmp/cd-install auto
              systemctl enable --now codedeploy-agent

              # ── App user + directories ─────────────────────────────────────
              id -u $APP_USER &>/dev/null || \
                  useradd --system --no-create-home --shell /sbin/nologin $APP_USER
              mkdir -p $APP_DIR
              python3.11 -m venv $APP_DIR/venv

              # ── Fetch secrets ──────────────────────────────────────────────
              SECRETS=$(aws secretsmanager get-secret-value \
                  --region "$REGION" --secret-id "$SECRET_ID" \
                  --query SecretString --output text)

              {
                echo "AWS_SECRETS_MANAGER_SECRET_ID=$SECRET_ID"
                echo "AWS_REGION=$REGION"
                echo "$SECRETS" | jq -r 'to_entries[] | "\(.key)=\(.value)"'
              } > $APP_DIR/.env
              chmod 600 $APP_DIR/.env

              DB_PASS=$(echo "$SECRETS" | jq -r '.DB_PASSWORD // "changeme"')

              # ── Nginx ──────────────────────────────────────────────────────
              cat > /etc/nginx/conf.d/eatpulse.conf <<'NGINX'
              server {
                  listen 80;
                  location = /health {
                      access_log off;
                      return 200 "ok\n";
                      add_header Content-Type text/plain;
                  }
                  location / {
                      proxy_pass http://127.0.0.1:8000;
                      proxy_http_version 1.1;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
                      client_max_body_size 10M;
                      proxy_read_timeout 60s;
                  }
              }
              NGINX
              rm -f /etc/nginx/conf.d/default.conf
              systemctl enable --now nginx

              # ── PgBouncer placeholder ─────────────────────────────────────
              mkdir -p /var/log/pgbouncer /var/run/pgbouncer
              chown pgbouncer:pgbouncer /var/log/pgbouncer /var/run/pgbouncer 2>/dev/null || true
              cat > /etc/pgbouncer/pgbouncer.ini <<'PGBC'
              [databases]
              eatpulse = host=127.0.0.1 port=5433 dbname=eatpulse
              [pgbouncer]
              listen_addr=127.0.0.1
              listen_port=5432
              auth_type=scram-sha-256
              auth_file=/etc/pgbouncer/userlist.txt
              pool_mode=transaction
              max_client_conn=100
              default_pool_size=10
              server_idle_timeout=300
              log_connections=0
              PGBC
              printf '"eatpulse" "%s"\n' "$DB_PASS" > /etc/pgbouncer/userlist.txt
              chmod 600 /etc/pgbouncer/userlist.txt

              # ── Systemd service ────────────────────────────────────────────
              cat > /etc/systemd/system/eatpulse-api.service <<SVCEOF
              [Unit]
              Description=EatPulse FastAPI + Telegram Bot
              After=network.target

              [Service]
              Type=exec
              User=$APP_USER
              WorkingDirectory=$APP_DIR
              EnvironmentFile=$APP_DIR/.env
              ExecStart=$APP_DIR/venv/bin/uvicorn dashboard.api.app:create_app \
                  --factory --host 127.0.0.1 --port 8000 --workers 2
              Restart=always
              RestartSec=5
              StandardOutput=journal
              StandardError=journal

              [Install]
              WantedBy=multi-user.target
              SVCEOF
              systemctl daemon-reload
              systemctl enable eatpulse-api

              chown -R $APP_USER:$APP_USER $APP_DIR
              echo "=== Bootstrap complete ==="
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "eatpulse-${Environment}"
              - Key: Project
                Value: EatPulse

  # ── Auto Scaling Group ──────────────────────────────────────────────────────
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "eatpulse-asg-${Environment}"
      MinSize: "1"
      MaxSize: "2"
      DesiredCapacity: "1"
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier: !Ref SubnetIds
      TargetGroupARNs:
        - !Ref TargetGroupArn
      CapacityRebalance: true
      HealthCheckType: ELB
      HealthCheckGracePeriod: 180
      Tags:
        - Key: Name
          Value: !Sub "eatpulse-${Environment}"
          PropagateAtLaunch: true
        - Key: Project
          Value: EatPulse
          PropagateAtLaunch: true
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT3M
        WaitOnResourceSignals: false

Outputs:
  ASGName:
    Value: !Ref AutoScalingGroup
    Export:
      Name: EatPulse-ASGName
  EC2SecurityGroupId:
    Value: !GetAtt EC2SecurityGroup.GroupId
    Export:
      Name: EatPulse-EC2SecurityGroupId
  EC2RoleArn:
    Value: !GetAtt EC2Role.Arn
    Export:
      Name: EatPulse-EC2RoleArn
