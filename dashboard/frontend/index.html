<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EatPulse — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .login-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2.5rem 3rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--green);
      margin-bottom: 0.25rem;
    }
    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .telegram-widget-wrapper {
      display: flex;
      justify-content: center;
    }
    .setup-note {
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .setup-note a {
      color: var(--green);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">🥗 EatPulse</div>
      <div class="tagline">Your personal food tracker & health companion</div>

      <div class="telegram-widget-wrapper">
        <script
          async
          src="https://telegram.org/js/telegram-widget.js?22"
          data-telegram-login="EatPulse_bot"
          data-size="large"
          data-onauth="onTelegramAuth(user)"
          data-request-access="write">
        </script>
      </div>

      <p class="setup-note">
        New here? First set up the bot by messaging<br/>
        <a href="https://t.me/EatPulse_bot" target="_blank">@EatPulse_bot</a> on Telegram.
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
