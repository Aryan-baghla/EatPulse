name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eatpulse
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: eatpulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://eatpulse:testpassword@localhost:5432/eatpulse_test
      AURORA_DIRECT_URL: postgresql://eatpulse:testpassword@localhost:5432/eatpulse_test
      TELEGRAM_BOT_TOKEN: "0000000000:test-token-for-ci"
      TELEGRAM_BOT_USERNAME: "TestEatPulseBot"
      OPENAI_API_KEY: "sk-test-key"
      JWT_SECRET: "test-jwt-secret-for-ci-only"
      ENVIRONMENT: development
      BOT_MODE: polling

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --cov=core --cov=database --cov=bot --cov-report=term-missing -q

      - name: Type check
        run: python -m mypy core/ database/ --ignore-missing-imports
        continue-on-error: true  # non-blocking for now
